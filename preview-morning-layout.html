<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morning Layout Preview</title>
    <style>
      :root {
        --bg: #fcf8f2;
        --card-bg: rgba(255, 255, 255, 0.78);
        --card-border: #efe4d8;
        --text: #2f261f;
        --muted: #8d8073;
        --accent: #eb6d32;
        --orange: #ef8c3a;
        --purple: #6e2b79;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 48%, rgba(232, 160, 112, 0.16), transparent 22%),
          linear-gradient(180deg, #fffdfa 0%, var(--bg) 45%, #faf3ea 100%);
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      .phone {
        width: 100%;
        max-width: 390px;
        min-height: 100vh;
        padding: 40px 16px 32px;
      }

      .top-card {
        display: flex;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--card-border);
        border-radius: 18px;
        background: var(--card-bg);
        box-shadow: 0 12px 30px rgba(80, 42, 18, 0.06);
        backdrop-filter: blur(10px);
      }

      .moon {
        width: 40px;
        height: 40px;
        flex: 0 0 auto;
        border-radius: 999px;
        display: grid;
        place-items: center;
        color: #5a2d16;
        background: #f7b460;
      }

      .date-line {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
      }

      .date-line strong {
        font-size: 13px;
      }

      .muted {
        color: var(--muted);
      }

      .chips {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }

      .chip {
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }

      .chip.soft {
        color: #65594f;
        background: #f8f2eb;
      }

      .chip.hot {
        color: var(--accent);
        background: #fff0e7;
      }

      .top-desc {
        margin-top: 8px;
        font-size: 11px;
        line-height: 1.55;
        color: #6f6257;
      }

      .center {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 255px;
      }

      .glow {
        position: absolute;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(232, 160, 112, 0.18) 0%, rgba(194, 89, 63, 0.08) 38%, rgba(111, 44, 124, 0.05) 58%, transparent 75%);
        filter: blur(18px);
      }

      .tarot {
        position: relative;
        z-index: 1;
        width: 178px;
        aspect-ratio: 2 / 3.4;
        border-radius: 28px;
        overflow: hidden;
        background: linear-gradient(135deg, #2e1a47 0%, #4a2060 40%, #c2593f 100%);
        box-shadow: 0 22px 46px rgba(68, 36, 76, 0.22);
      }

      .tarot-inner {
        position: absolute;
        inset: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
      }

      .corners::before,
      .corners::after,
      .corners i::before,
      .corners i::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 4px;
      }

      .corners::before { top: 12px; left: 12px; }
      .corners::after { top: 12px; right: 12px; }
      .corners i::before { bottom: 12px; left: 12px; }
      .corners i::after { bottom: 12px; right: 12px; }

      .sigil {
        width: 92px;
        height: 92px;
        border-radius: 50%;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .sigil::before,
      .sigil::after {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .sigil::after {
        inset: 25px;
        border-style: dashed;
      }

      .star {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: rgba(255, 235, 180, 0.95);
        font-size: 28px;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 235, 180, 0.9);
        box-shadow: 0 0 14px rgba(239, 140, 58, 0.8);
      }

      .tarot-title {
        text-align: center;
      }

      .tarot-title .en {
        color: rgba(255, 255, 255, 0.76);
        letter-spacing: 0.28em;
        font-size: 11px;
        font-weight: 700;
      }

      .tarot-title .cn {
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.42);
        font-size: 10px;
        font-weight: 600;
      }

      .selector-title {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 12px;
        font-size: 13px;
        font-weight: 600;
        color: #3d3340;
      }

      .spark {
        color: #e7b58f;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
      }

      .option {
        border-radius: 14px;
        border: 1px solid #efe7dd;
        background: rgba(255, 255, 255, 0.8);
        padding: 10px 4px 9px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 8px 18px rgba(80, 42, 18, 0.04);
      }

      .option.active {
        border-color: #f0a26f;
        box-shadow: 0 0 0 1px rgba(240, 162, 111, 0.35), 0 8px 18px rgba(240, 162, 111, 0.12);
      }

      .icon-box {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        margin-bottom: 6px;
        display: grid;
        place-items: center;
        color: white;
        background: linear-gradient(180deg, #d8d0cb, #bfb6af);
      }

      .option.active .icon-box {
        background: linear-gradient(180deg, #f3a04a, #d86b45);
      }

      .plus-box {
        background: transparent;
        border: 1px dashed #d8cec4;
        color: #b6aba0;
      }

      .option-label {
        font-size: 14px;
        font-weight: 600;
        color: #3a3027;
      }

      .btn {
        width: 100%;
        height: 44px;
        border: 0;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 600;
        cursor: default;
      }

      .btn.primary {
        margin-top: 16px;
        color: white;
        background: linear-gradient(90deg, var(--orange) 0%, var(--purple) 100%);
        box-shadow: 0 14px 28px rgba(112, 44, 124, 0.22);
      }

      .or {
        margin-top: 12px;
        text-align: center;
        font-size: 12px;
        color: #9b8f84;
      }

      .btn.secondary {
        margin-top: 12px;
        color: #5b416f;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid #cbb6d7;
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <section class="top-card">
        <div class="moon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3c0 4.97 4.03 9 9 9 .27 0 .53-.01.79-.03"></path>
          </svg>
        </div>
        <div>
          <div class="date-line">
            <strong>2026年6月23日</strong>
            <span class="muted">周二</span>
          </div>
          <div class="chips">
            <span class="chip soft">Lunar 五月初九</span>
            <span class="chip hot">新月</span>
          </div>
          <div class="top-desc">新周期的种子阶段，适合设定意愿与开始</div>
        </div>
      </section>

      <section class="center">
        <div class="glow"></div>
        <div class="tarot corners">
          <i></i>
          <div class="tarot-inner">
            <div class="sigil">
              <div class="star">✦</div>
            </div>
            <div class="dot"></div>
            <div class="tarot-title">
              <div class="en">COSMIC ECHO</div>
              <div class="cn">点击翻开今日卡牌</div>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="selector-title">
          <span class="spark">✦</span>
          <span>选择抽取张数</span>
          <span class="spark">✦</span>
        </div>

        <div class="grid">
          <div class="option active">
            <div class="icon-box">⬟</div>
            <div class="option-label">1张</div>
          </div>
          <div class="option">
            <div class="icon-box">⬟</div>
            <div class="option-label">3张</div>
          </div>
          <div class="option">
            <div class="icon-box">⬟</div>
            <div class="option-label">5张</div>
          </div>
          <div class="option">
            <div class="icon-box">⬟</div>
            <div class="option-label">7张</div>
          </div>
          <div class="option">
            <div class="icon-box plus-box">＋</div>
            <div class="option-label">自定义</div>
          </div>
        </div>

        <button class="btn primary">开始抽牌</button>
        <div class="or">或</div>
        <button class="btn secondary">手动选牌</button>
      </section>
    </div>
  </body>
</html>
